<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExecDraft - Executive Email Refiner</title>
    <!-- React and Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuration ---
        const apiKey = ""; // Set to empty string; environment provides at runtime
        const MODEL = "gemini-2.5-flash-preview-09-2025";

        const EMAIL_TYPES = [
            "Upward update to my boss",
            "Task assignment to my team",
            "Cross-functional request",
            "Bad news with solution attached",
            "Follow-up nudge (no response)",
            "Meeting request",
            "Thank you / recognition",
            "Declining a request diplomatically",
            "Escalation to leadership",
            "Cold internal introduction",
        ];

        const TONES = ["Formal", "Friendly", "Urgent", "Diplomatic", "Direct"];

        const SYSTEM_PROMPT = `You are a VP at a top-tier firm who writes emails that get read, get responses, and get results.
Write a ready-to-send professional email in this exact plain text format:
SUBJECT: [subject line here]
[full email body here]
Rules: Match tone exactly. No filler. No markdown. Plain text only. Sign off professionally.`;

        // --- Custom Icon Component to handle Lucide in React CDN ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { class: className }
                        });
                    }
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        function App() {
            const [emailType, setEmailType] = useState(EMAIL_TYPES[0]);
            const [tone, setTone] = useState(TONES[0]);
            const [recipient, setRecipient] = useState("");
            const [situation, setSituation] = useState("");
            const [ask, setAsk] = useState("");
            const [output, setOutput] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [copied, setCopied] = useState(false);

            const generateWithRetry = async (prompt, retries = 0) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                };

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Generation failed");
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    if (retries < 5) {
                        const delay = Math.pow(2, retries) * 1000;
                        await new Promise(res => setTimeout(res, delay));
                        return generateWithRetry(prompt, retries + 1);
                    }
                    throw err;
                }
            };

            const handleGenerate = async () => {
                if (!situation.trim()) {
                    setError("Please describe the context.");
                    return;
                }
                setLoading(true);
                setError("");
                try {
                    const prompt = `SCENARIO: ${emailType}\nTONE: ${tone}\nRECIPIENT: ${recipient}\nSITUATION: ${situation}\nASK: ${ask}`;
                    const result = await generateWithRetry(prompt);
                    setOutput(result);
                } catch (err) {
                    setError("Communication error. Please try again.");
                } finally {
                    setLoading(false);
                }
            };

            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = output;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="flex items-center justify-between mb-8 border-b border-slate-200 pb-6">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-[#4B286D] rounded-lg shadow-lg">
                                <Icon name="Mail" className="text-white w-6 h-6" />
                            </div>
                            <h1 className="text-2xl font-black text-[#4B286D] tracking-tighter">EXEC<span className="text-slate-400">DRAFT</span></h1>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="space-y-6 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                            <div className="space-y-4">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Scenario</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#4B286D] outline-none"
                                        value={emailType}
                                        onChange={e => setEmailType(e.target.value)}
                                    >
                                        {EMAIL_TYPES.map(t => <option key={t}>{t}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Tone</label>
                                    <div className="flex flex-wrap gap-2">
                                        {TONES.map(t => (
                                            <button 
                                                key={t}
                                                onClick={() => setTone(t)}
                                                className={`px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${tone === t ? 'bg-[#4B286D] text-white' : 'bg-white text-slate-500 border-slate-200'}`}
                                            >
                                                {t}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Recipient</label>
                                    <input 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm"
                                        placeholder="e.g. CEO, Team"
                                        value={recipient}
                                        onChange={e => setRecipient(e.target.value)}
                                    />
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Context</label>
                                    <textarea 
                                        rows="4"
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none"
                                        placeholder="What's happening?"
                                        value={situation}
                                        onChange={e => setSituation(e.target.value)}
                                    />
                                </div>

                                <button 
                                    onClick={handleGenerate}
                                    disabled={loading}
                                    className="w-full bg-[#4B286D] text-white py-4 rounded-xl font-black text-sm hover:bg-[#3a1f54] transition-all flex items-center justify-center gap-2"
                                >
                                    {loading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Sparkles" />}
                                    GENERATE EXECUTIVE DRAFT
                                </button>

                                {error && <div className="text-red-500 text-xs font-bold text-center mt-2">{error}</div>}
                            </div>
                        </div>

                        <div className="flex flex-col bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden min-h-[400px]">
                            <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Refined Draft</span>
                                {output && (
                                    <button onClick={handleCopy} className="text-[#4B286D] text-[10px] font-bold uppercase flex items-center gap-1 hover:underline">
                                        <Icon name={copied ? "Check" : "Copy"} className="w-3 h-3" />
                                        {copied ? "Copied" : "Copy"}
                                    </button>
                                )}
                            </div>
                            <div className="p-6 flex-1 bg-white">
                                {!output && !loading ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-20">
                                        <Icon name="Send" className="w-12 h-12 mb-2" />
                                        <p className="text-sm font-bold">Waiting for input...</p>
                                    </div>
                                ) : (
                                    <pre className="whitespace-pre-wrap font-mono text-sm text-slate-700 leading-relaxed">
                                        {output}
                                    </pre>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
